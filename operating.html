<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Інтернатура з анестезіології — Тиждень 2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0A0E14;
  --ink-2:#111823;
  --ink-3:#18212E;
  --rule:#22303F;
  --rule-soft:#1A2431;
  --paper:#E8EDF2;
  --paper-dim:#8A9BAD;
  --paper-faint:#576878;
  --trace:#3DDC91;
  --pleth:#3AC7E8;
  --press:#F2A33C;
  --alarm:#FF5C5C;
  --violet:#A78BFA;
  --r:3px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--ink);
  color:var(--paper);
  font-family:'Inter',system-ui,sans-serif;
  font-size:14px;
  line-height:1.5;
  min-height:100vh;
  overflow-x:hidden;
}
/* millimetre-paper substrate, like an anaesthetic chart */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    linear-gradient(var(--rule-soft) 1px,transparent 1px),
    linear-gradient(90deg,var(--rule-soft) 1px,transparent 1px);
  background-size:56px 56px;
  opacity:.5;
  mask-image:radial-gradient(ellipse 90% 70% at 50% 0%,#000 30%,transparent 100%);
}
#app{position:relative;z-index:1}
h1,h2,h3,h4{font-family:'Archivo',sans-serif;letter-spacing:-.02em;line-height:1.15}
button{font-family:inherit;font-size:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:inherit;color:inherit}
:focus-visible{outline:2px solid var(--pleth);outline-offset:2px}
.mono{font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums}

/* ---------- Header ---------- */
.topbar{
  position:sticky;top:0;z-index:40;
  background:rgba(10,14,20,.92);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--rule);
}
.topbar-in{
  max-width:1400px;margin:0 auto;padding:12px 20px;
  display:flex;align-items:center;gap:20px;flex-wrap:wrap;
}
.brand{display:flex;align-items:center;gap:11px;margin-right:auto}
.brand-mark{
  width:34px;height:34px;flex:none;border:1px solid var(--rule);
  border-radius:var(--r);position:relative;overflow:hidden;background:var(--ink-2);
}
.brand-mark svg{position:absolute;inset:0;width:100%;height:100%}
.brand-txt strong{
  display:block;font-family:'Archivo';font-weight:800;font-size:14px;letter-spacing:-.01em;
}
.brand-txt span{
  display:block;font-size:10px;color:var(--paper-faint);
  text-transform:uppercase;letter-spacing:.13em;font-weight:600;margin-top:1px;
}
.role-switch{display:flex;border:1px solid var(--rule);border-radius:var(--r);overflow:hidden}
.role-switch button{
  padding:7px 13px;font-size:11px;font-weight:600;color:var(--paper-dim);
  text-transform:uppercase;letter-spacing:.07em;transition:.15s;white-space:nowrap;
}
.role-switch button + button{border-left:1px solid var(--rule)}
.role-switch button[aria-pressed="true"]{background:var(--paper);color:var(--ink)}
.role-switch button:hover:not([aria-pressed="true"]){background:var(--ink-3);color:var(--paper)}
.whoami{
  display:flex;align-items:center;gap:9px;padding-left:16px;
  border-left:1px solid var(--rule);
}
.avatar{
  width:28px;height:28px;border-radius:50%;flex:none;
  display:grid;place-items:center;font-size:10px;font-weight:700;
  font-family:'Archivo';background:var(--ink-3);border:1px solid var(--rule);
}
.whoami-txt{font-size:11px;line-height:1.35}
.whoami-txt b{display:block;font-weight:600}
.whoami-txt span{color:var(--paper-faint)}

/* ---------- Nav ---------- */
.modnav{border-bottom:1px solid var(--rule);background:var(--ink);overflow-x:auto;scrollbar-width:none}
.modnav::-webkit-scrollbar{display:none}
.modnav-in{max-width:1400px;margin:0 auto;padding:0 20px;display:flex;gap:2px}
.modnav button{
  padding:11px 15px;font-size:12px;font-weight:600;color:var(--paper-dim);
  border-bottom:2px solid transparent;white-space:nowrap;transition:.15s;
  display:flex;align-items:center;gap:7px;
}
.modnav button:hover{color:var(--paper)}
.modnav button[aria-current="page"]{color:var(--paper);border-bottom-color:var(--trace)}
.modnav .badge{
  font-size:9.5px;font-weight:700;padding:1px 5px;border-radius:20px;
  background:var(--alarm);color:#fff;font-family:'IBM Plex Mono';
}
.modnav .badge.quiet{background:var(--ink-3);color:var(--paper-dim)}

/* ---------- Layout ---------- */
main{max-width:1400px;margin:0 auto;padding:24px 20px 72px}
.pagehead{margin-bottom:22px}
.eyebrow{
  font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;
  color:var(--paper-faint);margin-bottom:7px;display:flex;align-items:center;gap:8px;
}
.eyebrow::after{content:'';flex:1;height:1px;background:var(--rule)}
.pagehead h2{font-size:26px;font-weight:800}
.pagehead p{color:var(--paper-dim);font-size:13px;margin-top:6px;max-width:66ch}

.grid{display:grid;gap:16px}
.g-2{grid-template-columns:repeat(2,1fr)}
.g-3{grid-template-columns:repeat(3,1fr)}
.g-side{grid-template-columns:1fr 330px;align-items:start}
@media(max-width:1080px){.g-side,.g-3{grid-template-columns:1fr}.g-3>*{min-width:0}}
@media(max-width:720px){.g-2{grid-template-columns:1fr}}

.card{background:var(--ink-2);border:1px solid var(--rule);border-radius:var(--r)}
.card-h{
  padding:13px 16px;border-bottom:1px solid var(--rule);
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
}
.card-h h3{font-size:13px;font-weight:700;letter-spacing:0}
.card-h .sub{font-size:11px;color:var(--paper-faint);width:100%;margin-top:-2px}
.card-b{padding:16px}
.card-b.tight{padding:0}

/* ---------- Buttons ---------- */
.btn{
  padding:8px 15px;border-radius:var(--r);font-size:12px;font-weight:600;
  border:1px solid var(--rule);transition:.15s;display:inline-flex;
  align-items:center;gap:7px;justify-content:center;
}
.btn:hover{border-color:var(--paper-faint);background:var(--ink-3)}
.btn-go{background:var(--trace);color:var(--ink);border-color:var(--trace);font-weight:700}
.btn-go:hover{background:#5FE8A9;border-color:#5FE8A9}
.btn-alarm{background:var(--alarm);color:#fff;border-color:var(--alarm);font-weight:700}
.btn-alarm:hover{background:#FF7878;border-color:#FF7878}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-block{width:100%}

/* ---------- Bits ---------- */
.tag{
  display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:2px;
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;
  border:1px solid;font-family:'IBM Plex Mono';
}
.t-go{color:var(--trace);border-color:rgba(61,220,145,.35);background:rgba(61,220,145,.08)}
.t-wait{color:var(--press);border-color:rgba(242,163,60,.35);background:rgba(242,163,60,.08)}
.t-stop{color:var(--alarm);border-color:rgba(255,92,92,.35);background:rgba(255,92,92,.08)}
.t-mute{color:var(--paper-faint);border-color:var(--rule);background:var(--ink-3)}
.t-info{color:var(--pleth);border-color:rgba(58,199,232,.35);background:rgba(58,199,232,.08)}

.stat{padding:14px 16px;border:1px solid var(--rule);border-radius:var(--r);background:var(--ink-2)}
.stat-l{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--paper-faint);font-weight:700}
.stat-v{font-family:'IBM Plex Mono';font-size:27px;font-weight:600;margin-top:5px;letter-spacing:-.02em}
.stat-n{font-size:11px;color:var(--paper-faint);margin-top:3px}

.meter{height:3px;background:var(--ink-3);border-radius:2px;overflow:hidden;margin-top:9px}
.meter i{display:block;height:100%;background:var(--trace);transition:width .5s cubic-bezier(.2,.8,.2,1)}

.empty{padding:34px 16px;text-align:center;color:var(--paper-faint);font-size:12px}
.empty b{display:block;color:var(--paper-dim);font-weight:600;margin-bottom:5px;font-size:13px}

.field{margin-bottom:13px}
.field label{
  display:block;font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.1em;color:var(--paper-faint);margin-bottom:5px;
}
.field input,.field select,.field textarea{
  width:100%;padding:8px 10px;background:var(--ink);
  border:1px solid var(--rule);border-radius:var(--r);
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--pleth);outline:none}
.field textarea{resize:vertical;min-height:70px;line-height:1.55}
.field .hint{font-size:10.5px;color:var(--paper-faint);margin-top:4px}

table{width:100%;border-collapse:collapse;font-size:12px}
th{
  text-align:left;padding:9px 14px;font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:.1em;color:var(--paper-faint);
  border-bottom:1px solid var(--rule);white-space:nowrap;
}
td{padding:11px 14px;border-bottom:1px solid var(--rule-soft);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--ink-3)}

.scroll-x{overflow-x:auto;scrollbar-width:thin}
::-webkit-scrollbar{width:7px;height:7px}
::-webkit-scrollbar-track{background:var(--ink)}
::-webkit-scrollbar-thumb{background:var(--rule);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--paper-faint)}

/* ---------- Timeline (signature element) ---------- */
.chart{position:relative;background:var(--ink);border:1px solid var(--rule);border-radius:var(--r);overflow:hidden}
.chart-scale{
  display:flex;border-bottom:1px solid var(--rule);
  font-family:'IBM Plex Mono';font-size:9.5px;color:var(--paper-faint);
  background:var(--ink-2);
}
.chart-scale div{flex:1;padding:5px 0;text-align:center;border-right:1px solid var(--rule-soft)}
.chart-scale div:last-child{border-right:none}
.chart-rows{position:relative}
.crow{display:flex;align-items:stretch;border-bottom:1px solid var(--rule-soft);min-height:46px}
.crow:last-child{border-bottom:none}
.crow-l{
  width:118px;flex:none;padding:9px 12px;border-right:1px solid var(--rule);
  display:flex;flex-direction:column;justify-content:center;background:var(--ink-2);
}
.crow-l b{font-size:11px;font-weight:700;font-family:'Archivo'}
.crow-l span{font-size:9.5px;color:var(--paper-faint);font-family:'IBM Plex Mono';margin-top:1px}
.crow-track{flex:1;position:relative;padding:6px 0;min-width:0}
.blk{
  position:absolute;top:6px;bottom:6px;border-radius:2px;padding:5px 9px;
  font-size:10.5px;font-weight:600;overflow:hidden;cursor:pointer;
  border-left:2px solid;transition:.15s;display:flex;flex-direction:column;justify-content:center;
}
.blk:hover{filter:brightness(1.35);z-index:2}
.blk small{display:block;font-family:'IBM Plex Mono';font-size:9px;opacity:.65;font-weight:400}
.blk.k-briefing{background:rgba(167,139,250,.14);border-color:var(--violet);color:#C4B5FD}
.blk.k-practice{background:rgba(61,220,145,.13);border-color:var(--trace);color:#8FF0C2}
.blk.k-simulation{background:rgba(255,92,92,.13);border-color:var(--alarm);color:#FF9E9E}
.blk.k-debrief{background:rgba(58,199,232,.13);border-color:var(--pleth);color:#8FDDF2}
.nowline{position:absolute;top:0;bottom:0;width:1px;background:var(--press);z-index:3;pointer-events:none}
.nowline::before{
  content:'ЗАРАЗ';position:absolute;top:-1px;left:3px;font-size:8px;font-weight:700;
  color:var(--press);font-family:'IBM Plex Mono';letter-spacing:.1em;
}

/* ---------- Checklist ---------- */
.chk-sec{border-bottom:1px solid var(--rule)}
.chk-sec:last-child{border-bottom:none}
.chk-sec-h{
  padding:9px 16px;background:var(--ink-3);font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:.12em;color:var(--paper-dim);
  display:flex;justify-content:space-between;align-items:center;
}
.chk-item{
  display:flex;gap:11px;padding:11px 16px;border-bottom:1px solid var(--rule-soft);
  cursor:pointer;transition:.12s;align-items:flex-start;
}
.chk-item:last-child{border-bottom:none}
.chk-item:hover{background:var(--ink-3)}
.chk-box{
  width:17px;height:17px;flex:none;border:1px solid var(--rule);border-radius:2px;
  margin-top:1px;display:grid;place-items:center;transition:.12s;background:var(--ink);
}
.chk-item[data-on="1"] .chk-box{background:var(--trace);border-color:var(--trace)}
.chk-box svg{width:11px;height:11px;stroke:var(--ink);stroke-width:3.5;fill:none;opacity:0}
.chk-item[data-on="1"] .chk-box svg{opacity:1}
.chk-txt b{display:block;font-size:12.5px;font-weight:600}
.chk-item[data-on="1"] .chk-txt b{color:var(--paper-dim)}
.chk-txt span{display:block;font-size:11px;color:var(--paper-faint);margin-top:2px;line-height:1.45}
.crit{
  font-size:8.5px;font-weight:700;color:var(--alarm);font-family:'IBM Plex Mono';
  letter-spacing:.1em;margin-left:6px;vertical-align:1px;
}
.warnbar{
  padding:11px 16px;background:rgba(242,163,60,.09);border-left:2px solid var(--press);
  font-size:11.5px;color:#F8CE93;display:flex;gap:9px;align-items:flex-start;line-height:1.5;
}
.warnbar svg{width:15px;height:15px;flex:none;margin-top:1px;stroke:var(--press);fill:none;stroke-width:2}

/* ---------- Scenario ---------- */
.sim-stage{background:var(--ink);border:1px solid var(--rule);border-radius:var(--r);overflow:hidden}
.sim-vitals{
  display:grid;grid-template-columns:repeat(4,1fr);
  border-bottom:1px solid var(--rule);background:#05080C;
}
.sv{padding:11px 14px;border-right:1px solid var(--rule-soft)}
.sv:last-child{border-right:none}
.sv-l{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;opacity:.65}
.sv-v{font-family:'IBM Plex Mono';font-size:25px;font-weight:600;line-height:1.1;margin-top:3px}
.sv.hr{color:var(--trace)} .sv.spo2{color:var(--pleth)}
.sv.bp{color:var(--press)} .sv.etco2{color:var(--violet)}
.sv.crit .sv-v{color:var(--alarm);animation:flash 1.1s infinite}
@keyframes flash{0%,100%{opacity:1}50%{opacity:.4}}
.sim-clock{
  height:2px;background:var(--ink-3);position:relative;overflow:hidden;
}
.sim-clock i{
  display:block;height:100%;background:var(--press);
  transition:width 1s linear;
}
.sim-clock.hot i{background:var(--alarm)}
.sim-body{padding:18px}
.sim-prompt{font-size:14px;line-height:1.6;margin-bottom:15px}
.sim-prompt b{color:var(--press)}
.sim-opt{
  display:block;width:100%;text-align:left;padding:12px 14px;margin-bottom:8px;
  background:var(--ink-2);border:1px solid var(--rule);border-radius:var(--r);
  font-size:12.5px;transition:.15s;line-height:1.5;
}
.sim-opt:hover:not(:disabled){border-color:var(--pleth);background:var(--ink-3)}
.sim-opt .role{
  display:block;font-size:9px;font-weight:700;letter-spacing:.13em;
  text-transform:uppercase;color:var(--paper-faint);margin-bottom:4px;font-family:'IBM Plex Mono';
}
.sim-opt.picked-ok{border-color:var(--trace);background:rgba(61,220,145,.09)}
.sim-opt.picked-no{border-color:var(--alarm);background:rgba(255,92,92,.09)}
.sim-log{
  border-top:1px solid var(--rule);max-height:180px;overflow-y:auto;
  font-family:'IBM Plex Mono';font-size:11px;
}
.sim-log-i{padding:9px 16px;border-bottom:1px solid var(--rule-soft);display:flex;gap:10px;line-height:1.5}
.sim-log-i:last-child{border-bottom:none}
.sim-log-i time{color:var(--paper-faint);flex:none}
.sim-log-i.ok{color:#8FF0C2} .sim-log-i.no{color:#FF9E9E} .sim-log-i.to{color:var(--press)}

/* ---------- Verify queue ---------- */
.vq{border-bottom:1px solid var(--rule-soft);padding:13px 16px;display:flex;gap:13px;align-items:flex-start}
.vq:last-child{border-bottom:none}
.vq:hover{background:var(--ink-3)}
.vq-main{flex:1;min-width:0}
.vq-main b{font-size:12.5px;font-weight:600;display:block}
.vq-meta{font-size:10.5px;color:var(--paper-faint);margin-top:3px;font-family:'IBM Plex Mono'}
.vq-act{display:flex;gap:6px;flex:none}

/* ---------- Vitals sparkline ---------- */
.spark{width:100%;height:96px;display:block}

.toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(90px);
  background:var(--ink-3);border:1px solid var(--rule);border-radius:var(--r);
  padding:11px 18px;font-size:12.5px;font-weight:600;z-index:90;
  transition:transform .3s cubic-bezier(.2,.8,.2,1);box-shadow:0 8px 28px rgba(0,0,0,.6);
  display:flex;align-items:center;gap:9px;max-width:calc(100vw - 32px);
}
.toast.on{transform:translateX(-50%) translateY(0)}
.toast::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--trace);flex:none}
.toast.warn::before{background:var(--press)}
.toast.bad::before{background:var(--alarm)}

@media(max-width:640px){
  .topbar-in{padding:10px 14px;gap:12px}
  .whoami{padding-left:0;border-left:none}
  main{padding:18px 14px 60px}
  .pagehead h2{font-size:21px}
  .crow-l{width:88px;padding:7px 9px}
  .sim-vitals{grid-template-columns:repeat(2,1fr)}
  .sv{border-bottom:1px solid var(--rule-soft)}
  .stat-v{font-size:23px}
}
@media(prefers-reduced-motion:reduce){
  *{animation-duration:.01ms!important;transition-duration:.01ms!important}
}

/* ---------- ACCESS GATE ---------- */
#gate{position:fixed;inset:0;z-index:400;background:var(--ink,#0f1419);
  display:flex;align-items:center;justify-content:center;padding:24px;overflow-y:auto}
.gate-card{width:100%;max-width:430px;background:var(--panel,#171d24);
  border:1px solid var(--line,#2a333d);border-radius:14px;padding:30px}
.gate-head{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.gate-head svg{width:34px;height:34px;flex-shrink:0}
.gate-head strong{display:block;font-size:16px;line-height:1.2}
.gate-head span{font-size:11.5px;color:var(--paper-dim,#8d9aa8)}
.gate-tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:1px solid var(--line,#2a333d)}
.gate-tabs button{flex:1;background:none;border:none;border-bottom:2px solid transparent;
  padding:10px;color:var(--paper-dim,#8d9aa8);font:inherit;font-size:13px;font-weight:600;cursor:pointer}
.gate-tabs button[aria-selected=true]{color:var(--trace,#3DDC91);border-bottom-color:var(--trace,#3DDC91)}
.gate-field{margin-bottom:13px}
.gate-field label{display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.09em;
  color:var(--paper-dim,#8d9aa8);font-weight:700;margin-bottom:5px}
.gate-field input{width:100%;background:var(--ink,#0f1419);border:1px solid var(--line,#2a333d);
  color:var(--paper,#e8edf2);border-radius:7px;padding:10px 12px;font:inherit;font-size:14px}
.gate-field input:focus{outline:2px solid var(--trace,#3DDC91);outline-offset:1px}
.gate-btn{width:100%;background:var(--trace,#3DDC91);color:#0b0f14;border:none;border-radius:7px;
  padding:12px;font:inherit;font-size:14px;font-weight:700;cursor:pointer}
.gate-btn:disabled{opacity:.6;cursor:default}
.gate-msg{font-size:12.5px;padding:10px 12px;border-radius:7px;margin-top:13px;display:none;line-height:1.5}
.gate-msg.err{display:block;background:rgba(239,83,80,.12);border:1px solid rgba(239,83,80,.4);color:#ff8a85}
.gate-msg.ok{display:block;background:rgba(61,220,145,.12);border:1px solid rgba(61,220,145,.4);color:var(--trace,#3DDC91)}
.code-out{font-family:ui-monospace,monospace;font-size:26px;font-weight:700;color:var(--trace,#3DDC91);
  text-align:center;padding:16px;background:var(--ink,#0f1419);border:1px dashed var(--trace,#3DDC91);
  border-radius:8px;letter-spacing:.08em;margin:14px 0}
.day-locked{opacity:.45}
.lockwall{text-align:center;padding:56px 24px}
.lockwall .ico{font-size:38px;margin-bottom:12px;opacity:.5}
.lockwall h3{margin:0 0 8px;font-size:17px}
.lockwall p{color:var(--paper-dim,#8d9aa8);font-size:13px;max-width:46ch;margin:0 auto;line-height:1.6}

</style>
</head>
<body>
<div id="gate">

function toast(msg,kind=''){
  const t = el('toast');
  t.className = 'toast on ' + kind;
  t.textContent = msg;
  clearTimeout(t._t);
  t._t = setTimeout(()=>{ t.className='toast '+kind; }, 2600);

function chkState(internId, key){
  return S.checklists[internId]?.[key] || { items:{}, status:'draft', comment:'' };
}
function chkStats(internId, key){
  const tpl = CHECKLISTS[key], st = chkState(internId,key);
  let total=0, done=0, critMissing=[];
  tpl.sections.forEach(sec=>sec.items.forEach(it=>{
    total++;
    if(st.items[it.id]) done++;
    else if(it.crit) critMissing.push(it.label);
  }));
  return { total, done, critMissing, pct: total? Math.round(done/total*100):0, status:st.status };
}
function procStats(internId){
  return PROCEDURES.map(p=>{
    const mine = S.logs.filter(l=>l.intern===internId && l.proc===p.id);
    const ver = mine.filter(l=>l.status==='verified').length;
    const pend = mine.filter(l=>l.status==='submitted').length;
    const succ = mine.filter(l=>l.out==='success').length;
    return { ...p, ver, pend, total:mine.length,
             rate: mine.length? Math.round(succ/mine.length*100):null };
  });
}
function pendingCount(){
  const logs = S.logs.filter(l=>l.status==='submitted').length;
  let chk=0;
  Object.keys(S.checklists).forEach(iid=>{
    Object.keys(CHECKLISTS).forEach(k=>{ if(chkState(iid,k).status==='submitted') chk++; });
  });
  return logs+chk;
}

/* ВСТАВТЕ СЮДИ URL вашого Apps Script веб-застосунку (закінчується на /exec) */
var API = 'https://script.google.com/macros/s/AKfycbznqqXfcfyRURrpsTd_d3u9IOOUcPpYnqB0DFivJtMIp_4y1PTf5roOxqH6JALDymE/exec';

var session = { code:null, name:'', group:'', unlocked:1, scores:[null,null,null,null,null], total:5 };
var DEMO = API.indexOf('ВСТАВТЕ') === 0;

function sGet(k){ try { return localStorage.getItem(k); } catch(e){ return null; } }
function sSet(k,v){ try { localStorage.setItem(k,v); } catch(e){} }
function sDel(k){ try { localStorage.removeItem(k); } catch(e){} }

function urlCode(){
  var m = window.location.search.match(/[?&]k=([^&]+)/);
  return m ? decodeURIComponent(m[1]) : null;
}

function apiCall(params){
  var qs = Object.keys(params).map(function(k){
    return encodeURIComponent(k)+'='+encodeURIComponent(params[k]);
  }).join('&');
  return fetch(API+'?'+qs, { method:'GET', redirect:'follow' })
         .then(function(r){ return r.json(); });
}

function gateMsg(text, kind){
  var m = document.getElementById('gateMsg');
  m.className = 'gate-msg ' + (kind || 'err');
  m.textContent = text;
}

function showGate(show){
  document.getElementById('gate').style.display = show ? 'flex' : 'none';
  document.body.style.overflow = show ? 'hidden' : '';
}

function pickDay(n){
  if (n > session.unlocked){
    toast('День ' + n + ' ще закрито. Дні відкриваються послідовно.', 'bad');
    return;
  }
  S.day = n;
  render();
}

function report(type, day, detail, result, score){
  if (DEMO || !session.code) return Promise.resolve();
  var p = { action:'progress', code:session.code, type:type, day:day||'',
            detail:detail||'', result:result||'' };
  if (score != null) p.score = score;
  return apiCall(p).then(function(r){
    if (r && r.ok){
      session.unlocked = r.unlocked;
      session.scores = r.scores || session.scores;
    }
  }).catch(function(){});
}

function doLogin(code, silent){
  return apiCall({ action:'state', code:code }).then(function(r){
    if (!r.ok){ if(!silent) gateMsg(r.error || 'Код не знайдено.'); return false; }
    session.code = r.code; session.name = r.name; session.group = r.group || '';
    session.unlocked = r.unlocked; session.scores = r.scores || session.scores;
    session.total = r.total || 5;
    sSet('or_code', r.code);
    if (S.day > session.unlocked) S.day = session.unlocked;
    showGate(false); render();
    return true;
  }).catch(function(){
    if(!silent) gateMsg('Немає зв\'язку з сервером. Перевірте інтернет.');
    return false;
  });
}

function logoutGate(){
  sDel('or_code');
  session.code = null;
  window.location.search = '';
}

function bindGate(){
  document.getElementById('gtLogin').onclick = function(){
    this.setAttribute('aria-selected','true');
    document.getElementById('gtReg').setAttribute('aria-selected','false');
    document.getElementById('gateLogin').style.display = '';
    document.getElementById('gateReg').style.display = 'none';
    document.getElementById('gateMsg').className = 'gate-msg';
  };
  document.getElementById('gtReg').onclick = function(){
    this.setAttribute('aria-selected','true');
    document.getElementById('gtLogin').setAttribute('aria-selected','false');
    document.getElementById('gateReg').style.display = '';
    document.getElementById('gateLogin').style.display = 'none';
    document.getElementById('gateMsg').className = 'gate-msg';
  };

  document.getElementById('btnReg').onclick = function(){
    var name = document.getElementById('inName').value.trim();
    var group = document.getElementById('inGroup').value.trim();
    if (name.length < 3){ gateMsg('Вкажіть прізвище та ім\'я.'); return; }
    var btn = this; btn.disabled = true; btn.textContent = 'Реєструємо…';
    apiCall({ action:'register', name:name, group:group }).then(function(r){
      btn.disabled = false; btn.textContent = 'Зареєструватися';
      if (!r.ok){ gateMsg(r.error || 'Не вдалося зареєструватися.'); return; }
      session.code = r.code; session.name = r.name;
      session.unlocked = r.unlocked; session.scores = r.scores || session.scores;
      sSet('or_code', r.code);
      document.getElementById('codeOut').textContent = r.code;
      document.getElementById('gateReg').style.display = 'none';
      document.getElementById('gateLogin').style.display = 'none';
      document.querySelector('.gate-tabs').style.display = 'none';
      document.getElementById('gateCode').style.display = '';
      gateMsg(r.existed ? 'Ви вже зареєстровані — це ваш попередній код.'
                        : 'Реєстрація успішна. Запишіть код доступу.', 'ok');
    }).catch(function(){
      btn.disabled = false; btn.textContent = 'Зареєструватися';
      gateMsg('Немає зв\'язку з сервером. Перевірте інтернет.');
    });
  };

  document.getElementById('btnEnter').onclick = function(){
    if (S.day > session.unlocked) S.day = session.unlocked;
    showGate(false); render();
  };

  document.getElementById('btnLogin').onclick = function(){
    var c = document.getElementById('inCode').value.trim();
    if (!c){ gateMsg('Введіть код доступу.'); return; }
    var btn = this; btn.disabled = true; btn.textContent = 'Перевіряємо…';
    doLogin(c, false).then(function(){ btn.disabled = false; btn.textContent = 'Увійти'; });
  };
  document.getElementById('inCode').addEventListener('keydown', function(e){
    if (e.key === 'Enter') document.getElementById('btnLogin').click();
  });
}

function bootGate(){
  bindGate();
  if (DEMO){
    session.unlocked = 5; session.name = 'Демо-режим';
    showGate(false); render();
    return;
  }
  var code = urlCode() || sGet('or_code');
  if (code){
    document.getElementById('inCode').value = code;
    doLogin(code, true).then(function(ok){ if (!ok) showGate(true); });
  } else {
    showGate(true);
  }
}

function timeline(dayN){
  const blocks = DAY_BLOCKS[dayN] || [];
  const SPAN = 480; // 07:00 → 15:00
  const hours = ['07','08','09','10','11','12','13','14'];
  const kinds = {briefing:'Брифінг',practice:'Практика',simulation:'Симуляція',debrief:'Дебрифінг'};
  const rows = ['briefing','practice','simulation','debrief'].filter(k=>blocks.some(b=>b[2]===k));

  return `<div class="chart">
    <div class="chart-scale">
      <div style="flex:0 0 118px;text-align:left;padding-left:12px">Блок</div>
      ${hours.map(h=>`<div>${h}:00</div>`).join('')}
    </div>
    <div class="chart-rows">
      ${rows.map(k=>{
        const bs = blocks.filter(b=>b[2]===k);
        const mins = bs.reduce((a,b)=>a+b[1],0);
        return `<div class="crow">
          <div class="crow-l"><b>${kinds[k]}</b><span>${mins} хв</span></div>
          <div class="crow-track">
            ${bs.map(([st,dur,kind,title,detail])=>{
              const L=(st/SPAN*100).toFixed(2), W=(dur/SPAN*100).toFixed(2);
              return `<div class="blk k-${kind}" style="left:${L}%;width:${W}%"
                        title="${esc(title)} — ${esc(detail)}">
                        ${esc(title)}<small>${dur} хв</small></div>`;
            }).join('')}
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function checklistCard(key){
  const tpl = CHECKLISTS[key], st = chkState(S.me,key), stats = chkStats(S.me,key);
  const locked = st.status==='submitted' || st.status==='verified';
  const tagMap = { draft:['t-mute','Чернетка'], submitted:['t-wait','На перевірці'],
                   verified:['t-go','Підтверджено'], rejected:['t-stop','Відхилено'] };
  const [tc,tt] = tagMap[st.status];

  return `<div class="card">
    <div class="card-h">
      <h3>${esc(tpl.title)}</h3>
      <span class="tag ${tc}">${tt}</span>
      <span class="mono" style="margin-left:auto;font-size:11px;color:var(--paper-faint)">
        ${stats.done}/${stats.total}</span>
    </div>
    ${tpl.warn?`<div class="warnbar">${icon('warn')}<div>${esc(tpl.warn)}</div></div>`:''}
    <div class="card-b tight">
      ${tpl.sections.map(sec=>{
        const d = sec.items.filter(i=>st.items[i.id]).length;
        return `<div class="chk-sec">
          <div class="chk-sec-h"><span>${esc(sec.name)}</span>
            <span class="mono" style="color:${d===sec.items.length?'var(--trace)':'var(--paper-faint)'}">${d}/${sec.items.length}</span></div>
          ${sec.items.map(it=>`
            <div class="chk-item" data-on="${st.items[it.id]?1:0}"
                 ${locked?'':`onclick="toggleChk('${key}','${it.id}')"`}
                 role="checkbox" aria-checked="${!!st.items[it.id]}" tabindex="0"
                 ${locked?'':`onkeydown="if(event.key===' '||event.key==='Enter'){event.preventDefault();toggleChk('${key}','${it.id}')}"`}>
              <div class="chk-box">${icon('check')}</div>
              <div class="chk-txt">
                <b>${esc(it.label)}${it.crit?'<span class="crit">КРИТИЧНО</span>':''}</b>
                ${it.hint?`<span>${esc(it.hint)}</span>`:''}
              </div>
            </div>`).join('')}
        </div>`;
      }).join('')}
    </div>
    <div class="card-b" style="border-top:1px solid var(--rule);display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      ${st.status==='verified'
        ? `<div style="font-size:12px;color:var(--trace)">Підтверджено${st.comment?`: «${esc(st.comment)}»`:''}</div>`
        : st.status==='submitted'
        ? `<div style="font-size:12px;color:var(--paper-dim)">Надіслано на перевірку. Редагування заблоковано.</div>`
        : stats.critMissing.length
        ? `<div style="font-size:11.5px;color:var(--press);flex:1">
             Не позначено критичних пунктів: <b>${stats.critMissing.length}</b> — ${esc(stats.critMissing[0])}${stats.critMissing.length>1?' та інші':''}
           </div>
           <button class="btn" disabled>Надіслати на перевірку</button>`
        : `<div style="font-size:11.5px;color:var(--trace);flex:1">Критичні пункти закриті.</div>
           <button class="btn btn-go" onclick="submitChk('${key}')">Надіслати на перевірку</button>`}
    </div>
  </div>`;
}

function toggleChk(key,id){
  const st = S.checklists[S.me][key];
  st.items[id] = st.items[id] ? 0 : 1;
  render();
}
function submitChk(key){
  const stats = chkStats(S.me,key);
  if(stats.critMissing.length){ toast('Критичні пункти не закриті','bad'); return; }
  S.checklists[S.me][key].status = 'submitted';
  toast('Чек-лист надіслано на перевірку');
  report('чек-лист', S.day, key, 'надіслано');
  render();
}

function spark(label,key,color,min,max){
  return `<div>
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px">
      <span style="font-size:10px;font-weight:700;letter-spacing:.11em;text-transform:uppercase;color:var(--paper-faint)">${label}</span>
      <span class="mono" style="font-size:15px;color:${color}">${S.record.vitals[S.record.vitals.length-1][key]}</span>
    </div>
    <canvas class="spark" data-key="${key}" data-color="${color}" data-min="${min}" data-max="${max}"></canvas>
  </div>`;
}

function drawSparks(){
  document.querySelectorAll('.spark').forEach(cv=>{
    const key=cv.dataset.key, color=cv.dataset.color;
    const min=+cv.dataset.min, max=+cv.dataset.max;
    const dpr=window.devicePixelRatio||1;
    const W=cv.clientWidth, H=cv.clientHeight;
    cv.width=W*dpr; cv.height=H*dpr;
    const c=cv.getContext('2d'); c.scale(dpr,dpr);
    const data=S.record.vitals.map(v=>v[key]);
    const pad=14, iw=W-pad*2, ih=H-pad*2;
    const X=i=>pad+(i/(data.length-1))*iw;
    const Y=v=>pad+ih-((v-min)/(max-min))*ih;

    // grid
    c.strokeStyle='#1A2431'; c.lineWidth=1;
    for(let i=0;i<=4;i++){ const y=pad+(ih/4)*i;
      c.beginPath(); c.moveTo(pad,y); c.lineTo(W-pad,y); c.stroke(); }

    // area fill
    const g=c.createLinearGradient(0,pad,0,H-pad);
    g.addColorStop(0,color.replace('var(--','').length?hexAlpha(color,.18):'rgba(0,0,0,0)');
    g.addColorStop(1,'rgba(0,0,0,0)');
    c.beginPath(); c.moveTo(X(0),H-pad);
    data.forEach((v,i)=>c.lineTo(X(i),Y(v)));
    c.lineTo(X(data.length-1),H-pad); c.closePath();
    c.fillStyle=g; c.fill();

    // line
    c.beginPath();
    data.forEach((v,i)=> i?c.lineTo(X(i),Y(v)):c.moveTo(X(i),Y(v)));
    c.strokeStyle=cssVar(color); c.lineWidth=1.8;
    c.lineJoin='round'; c.lineCap='round'; c.stroke();

    // dots
    c.fillStyle=cssVar(color);
    data.forEach((v,i)=>{ c.beginPath(); c.arc(X(i),Y(v),2.1,0,7); c.fill(); });
  });
}
function cssVar(v){
  if(!v.startsWith('var(')) return v;
  return getComputedStyle(document.documentElement).getPropertyValue(v.slice(4,-1)).trim();
}
function hexAlpha(v,a){
  const h=cssVar(v).replace('#','');
  const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);
  return `rgba(${r},${g},${b},${a})`;
}
function nextTime(){

function startSim(code){
  stopSim();
  const sc = SCENARIOS[code];
  S.sim = { code, node:sc.start, score:0, log:[], timer:null,
            left:sc.nodes[sc.start].limit||30, done:false, steps:0, correct:0 };
  S.view='sim';
  render();
  tickSim();
}
function tickSim(){
  clearInterval(S.sim.timer);
  S.sim.timer = setInterval(()=>{
    if(S.sim.done){ clearInterval(S.sim.timer); return; }
    S.sim.left--;
    if(S.sim.left<=0){ timeoutSim(); return; }
    const c = document.querySelector('.sim-clock');
    if(c){
      const nd = SCENARIOS[S.sim.code].nodes[S.sim.node];
      const frac = S.sim.left/(nd.limit||30)*100;
      c.querySelector('i').style.width = frac+'%';
      c.classList.toggle('hot', frac<35);
      const t = c.parentElement.querySelector('.sim-body .mono');
      if(t) { t.textContent = S.sim.left+' с'; t.style.color = S.sim.left<=7?'var(--alarm)':'var(--press)'; }
    }
  },1000);
}
function stopSim(){ clearInterval(S.sim.timer); S.sim.timer=null; }

function timeoutSim(){
  const sc = SCENARIOS[S.sim.code], nd = sc.nodes[S.sim.node];
  S.sim.log.push({ t:stamp(), k:'to', txt:'Час вичерпано. Бездіяльність — стан пацієнта погіршився.' });
  S.sim.score -= 20; S.sim.steps++;
  advance(nd.opts[0].nx);
  toast('Дедлайн пропущено','bad');
}
function decide(i){
  const sc = SCENARIOS[S.sim.code], nd = sc.nodes[S.sim.node], o = nd.opts[i];
  S.sim.steps++; S.sim.score += o.s;
  if(o.ok) S.sim.correct++;
  S.sim.log.push({ t:stamp(), k:o.ok?'ok':'no', txt:(o.ok?'✓ ':'✗ ')+o.fb });
  advance(o.nx);
}
function advance(next){
  if(next && SCENARIOS[S.sim.code].nodes[next]){
    S.sim.node = next;
    S.sim.left = SCENARIOS[S.sim.code].nodes[next].limit||30;
    render(); tickSim();
  } else {
    stopSim();
    S.sim.done = true;
    const pct = S.sim.steps? Math.round(S.sim.correct/S.sim.steps*100):0;
    S.scenarioResults[S.sim.code] = { pct, score:S.sim.score, steps:S.sim.steps, correct:S.sim.correct };
    render();
  }
}
function stamp(){ return new Date().toTimeString().slice(0,8); }

  });

  S.logs.filter(l=>l.status==='submitted').forEach(l=>{
    const p = PROCEDURES.find(x=>x.id===l.proc);

      meta:`${USERS[l.intern].name} · ${SUPERVISION[l.sup]} · ${OUTCOME[l.out]} · спроб ${l.attempts}`,
      note:l.note });
  });

  if(!rows.length) return `<div class="empty"><b>Черга порожня</b>Усі надіслані записи опрацьовані.</div>`;

  return rows.slice(0,limit).map(r=>`

function verifyChk(iid,k,ok){

function verifyLog(id,ok){

  else { S.logs = S.logs.filter(x=>x.id!==id); toast('Запис повернено інтерну','warn'); }

function drawAnalytics(){
  // Пропущені пункти
  const miss = {};
  Object.keys(S.checklists).forEach(iid=>{
    Object.keys(CHECKLISTS).forEach(k=>{
      const st=chkState(iid,k);
      if(st.status==='draft' && !Object.keys(st.items).length) return;
      CHECKLISTS[k].sections.forEach(sec=>sec.items.forEach(it=>{
        if(!st.items[it.id]) miss[it.label]=(miss[it.label]||0)+1;
      }));
    });
  });
  const top = Object.entries(miss).sort((a,b)=>b[1]-a[1]).slice(0,6);
  bars('cv-miss', top.map(([l,v])=>({l, v})), '#F2A33C', 4, '×');

  // Норматив
  const ids=['i1','i2','i3','i4'];
  const pd = PROCEDURES.map(p=>{
    const done = ids.reduce((a,i)=>a+S.logs.filter(l=>l.intern===i&&l.proc===p.id&&l.status==='verified').length,0);
    return { l:p.name, v:done, max:p.target*ids.length };
  }).sort((a,b)=>b.v/b.max-a.v/a.max).slice(0,6);
  bars('cv-proc', pd.map(d=>({l:d.l, v:Math.round(d.v/d.max*100)})), '#3DDC91', 100, '%');
}

function bars(id, data, color, max, unit){
  const cv = el(id); if(!cv || !data.length) return;
  const dpr=window.devicePixelRatio||1, W=cv.clientWidth, H=cv.clientHeight;
  cv.width=W*dpr; cv.height=H*dpr;
  const c=cv.getContext('2d'); c.scale(dpr,dpr);
  c.clearRect(0,0,W,H);

  const gap = 6;
  const rowH = H/data.length;
  const bh = Math.min(9, rowH*0.28);
  const M = max || Math.max(...data.map(d=>d.v),1);
  const valW = 40;
  const bw = W - valW;

  c.textBaseline='alphabetic';
  data.forEach((d,i)=>{
    const top = i*rowH;
    // label above its own bar — no horizontal crowding
    c.font='500 11px Inter,sans-serif';
    c.fillStyle='#8A9BAD'; c.textAlign='left';
    c.fillText(fit(c,d.l,bw-4), 0, top+rowH*0.42);
    // track + fill
    const by = top+rowH*0.42+7;
    c.fillStyle='#18212E';
    roundRect(c,0,by,bw,bh,bh/2); c.fill();
    c.fillStyle=color;
    roundRect(c,0,by,Math.max(bh,bw*Math.min(1,d.v/M)),bh,bh/2); c.fill();
    // value at right
    c.font='600 11px "IBM Plex Mono",monospace';
    c.fillStyle='#E8EDF2'; c.textAlign='right'; c.textBaseline='middle';
    c.fillText(d.v+(unit||''), W, by+bh/2);
    c.textBaseline='alphabetic';
  });
}
function fit(c,text,maxW){
  if(c.measureText(text).width<=maxW) return text;
  let t=text;
  while(t.length>4 && c.measureText(t+'…').width>maxW) t=t.slice(0,-1);
  return t+'…';
}
function roundRect(c,x,y,w,h,r){
  c.beginPath();
  c.moveTo(x+r,y); c.lineTo(x+w-r,y); c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r); c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h); c.quadraticCurveTo(x,y+h,x,y+h-r);
  c.lineTo(x,y+r); c.quadraticCurveTo(x,y,x+r,y); c.closePath();
}
